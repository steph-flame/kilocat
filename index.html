<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kilocat</title>
    <meta name="description" content="Work out how much to feed a cat: target energy from the animal, grams from the food split, and a transition schedule." />
    <!-- PWA install metadata — vite-plugin-pwa injects the manifest link + SW registration
         at build time; theme-color and the Apple-specific tags below aren't auto-injected. -->
    <meta name="theme-color" content="#B05A36" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kilocat" />
    <!-- GoatCounter: cookie-less, privacy-respecting page counts (see README). The path hook
         records the hash route so #/ration vs #/expenditure count as distinct pages; the
         hashchange listener counts in-app navigation, not just first loads. -->
    <script>
      window.goatcounter = { path: () => location.pathname + location.hash };
      window.addEventListener("hashchange", () => {
        if (window.goatcounter.count) window.goatcounter.count({ path: location.pathname + location.hash });
      });
    </script>
    <script data-goatcounter="https://steph-flame.goatcounter.com/count" async src="%BASE_URL%count.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
